<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Invitation — Shukla &amp; Rahul</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Floating petals canvas -->
<canvas id="petalsCanvas" aria-hidden="true"></canvas>

<!-- ===== COVER PAGE ===== -->
<section class="cover" id="cover">
  <div class="cover-frame">
    <p class="cover-eyebrow">You are cordially invited</p>
    <h1 class="cover-names">Shukla <span>&amp;</span> Rahul</h1>
    <p class="cover-date">Wedding on 29th April 2026</p>
    <div class="cover-ornament"></div>
    <button class="cover-btn" id="openBtn" type="button">Open Invitation</button>
  </div>
</section>

<!-- ===== NOTEBOOK ===== -->
<main class="notebook-wrapper" id="notebookWrapper">

  <!-- Music toggle -->
  <button class="music-toggle" id="musicToggle" type="button" aria-label="Toggle background music">
    <svg class="icon-music-on" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18V5l12-2v13"/>
      <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
    </svg>
    <svg class="icon-music-off" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18V5l12-2v13"/>
      <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
      <line x1="1" y1="1" x2="23" y2="23"/>
    </svg>
  </button>

  <div class="notebook" id="notebook">
    <!-- Spine shadow -->
    <div class="spine"></div>

    <!-- Page 1 (front: image 0, back: image 1) -->
    <div class="page" id="p1" data-page="1">
      <div class="page-front page-content">
        <img src="images/c62c3e804ac14314e8356d7d0cfadc5dXLHbotnwiEaQuv54-0.png" alt="Wedding invite page 1">
      </div>
      <div class="page-back page-content">
        <img src="images/c62c3e804ac14314e8356d7d0cfadc5dXLHbotnwiEaQuv54-1.png" alt="Wedding invite page 2">
      </div>
    </div>

    <!-- Page 2 (front: image 2, back: image 3) -->
    <div class="page" id="p2" data-page="2">
      <div class="page-front page-content">
        <img src="images/c62c3e804ac14314e8356d7d0cfadc5dXLHbotnwiEaQuv54-2.png" alt="Wedding invite page 3">
      </div>
      <div class="page-back page-content">
        <img src="images/c62c3e804ac14314e8356d7d0cfadc5dXLHbotnwiEaQuv54-3.png" alt="Wedding invite page 4">
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <div class="controls" id="controls">
    <button class="nav-btn" id="prevBtn" type="button">&#10094; Previous</button>
    <span class="page-indicator" id="pageIndicator">Page 1 of 4</span>
    <button class="nav-btn" id="nextBtn" type="button">Next &#10095;</button>
  </div>

</main>

<script src="script.js"></script>
</body>
</html>
